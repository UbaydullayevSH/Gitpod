<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content=" This page contains a login form for users to enter their credentials (username or email and password) to access restricted areas of the website. It may also include options for password recovery or links to create a new account.">
    <title>Gitpod - a platform for programmers</title>
    <!-- STYLE  -->
    <link rel="stylesheet" href="login/style.css">

    <!-- ICON  -->
    <link rel="shortcut icon" href="./assets/svg/header-icon.svg" type="image/x-icon">

    <!-- GOOGLE FONTS  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- LOGIN CONTAINER  -->
    <div class="login__container">
        <h2>Login</h2>
        <form id="loginForm" method="post">
            <label for="name">Enter your name:</label>
            <input type="text" id="name" name="name" required>

            <label for="contact">Enter your phone number or email address:</label>
            <input type="text" id="contact" name="contact" required>

            <button type="submit">Submit</button>
            <button type="button" id="cancelButton">Cancel</button>
            <button type="button" id="backButton">Back</button>
        </form>
        <p id="message"></p>
    </div>
    <!-- SCRIPT  -->
    <script src="js/login.js"></script>
</body>

</html>
